<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC英単語 選択式テスト</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            font-size: 1.6rem;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        .progress {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }
        .word {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            background-color: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-weight: 500;
        }
        .btn:hover:not(:disabled) {
            background-color: #edf2f7;
            border-color: #cbd5e0;
        }
        .btn:disabled {
            cursor: not-allowed;
        }
        .btn.correct {
            background-color: #c6f6d5;
            border-color: #48bb78;
            color: #22543d;
        }
        .btn.wrong {
            background-color: #fed7d7;
            border-color: #f56565;
            color: #742a2a;
        }
        .feedback {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 28px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .menu-btn {
            background-color: #fff;
            border: 2px solid #3182ce;
            color: #3182ce;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .menu-btn:hover {
            background-color: #ebf8ff;
        }
        .menu-btn.primary {
            background-color: #3182ce;
            color: white;
        }
        .menu-btn.primary:hover {
            background-color: #2b6cb0;
        }
        .next-btn {
            margin-top: 20px;
            background-color: #2d3748;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            display: none;
            width: 100%;
        }
        .next-btn:hover {
            background-color: #1a202c;
        }
        .unit-title {
            font-size: 0.9rem;
            color: #a0aec0;
            text-align: left;
            margin-top: 15px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="menu-screen">
        <h1>TOEIC英単語テスト</h1>
        <div class="menu-grid">
            <button class="menu-btn primary" onclick="startQuiz('all')">🔄 総合復習テスト (ランダム10問)</button>
            
            <div class="unit-title">各ユニット復習 (全16問)</div>
            <button class="menu-btn" onclick="startQuiz(1)">Day 1</button>
            <button class="menu-btn" onclick="startQuiz(2)">Day 2</button>
            <button class="menu-btn" onclick="startQuiz(3)">Day 3</button>
            <button class="menu-btn" onclick="startQuiz(4)">Day 4</button>
            <button class="menu-btn" onclick="startQuiz(5)">Day 5</button>
            <button class="menu-btn" onclick="startQuiz(6)">Day 6</button>
            <button class="menu-btn" onclick="startQuiz(7)">Day 7</button>
            <button class="menu-btn" onclick="startQuiz(8)">Day 8</button>
        </div>
    </div>

    <div id="quiz-screen" style="display: none;">
        <div class="progress" id="progress"></div>
        <div class="word" id="question-word"></div>
        <div class="options-grid" id="options-container"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-button" onclick="nextQuestion()">次の問題へ</button>
    </div>

    <div id="result-screen" style="display: none;">
        <h2>テスト終了！</h2>
        <div class="word" id="score">0 / 0</div>
        <button class="menu-btn primary" style="width: 100%; margin-top: 20px;" onclick="backToMenu()">メニューに戻る</button>
    </div>
</div>

<script>
// 全128単語のマスターデータ（Day 8まで完全対応）
const wordMaster = [

  { word: "degree", meaning: "学位", day: 1 },
  { word: "expense", meaning: "費用", day: 1 },
  { word: "figure", meaning: "数字", day: 1 },
  { word: "property", meaning: "財産", day: 1 },
  { word: "demand", meaning: "需要", day: 1 },
  { word: "interview", meaning: "面接", day: 1 },
  { word: "notice", meaning: "通知", day: 1 },
  { word: "statement", meaning: "報告書、明細書", day: 1 },
  { word: "appointment", meaning: "約束", day: 1 },
  { word: "insurance", meaning: "保険", day: 1 },
  { word: "luggage", meaning: "手荷物", day: 1 },
  { word: "opportunity", meaning: "機会", day: 1 },
  // Day 2
  { word: "tip", meaning: "助言", day: 2 },
  { word: "equipment", meaning: "装置", day: 2 },
  { word: "issue", meaning: "問題", day: 2 },
  { word: "department", meaning: "部", day: 2 },
  { word: "instrument", meaning: "楽器", day: 2 },
  { word: "balance", meaning: "残高", day: 2 },

  { word: "rate", meaning: "率", day: 2 },

  { word: "complaint", meaning: "不満", day: 2 },
  { word: "honor", meaning: "光栄", day: 2 },
  { word: "vehicle", meaning: "乗り物", day: 2 },
  { word: "instruction", meaning: "説明書", day: 2 },
  { word: "minute", meaning: "議事録", day: 2 },
  { word: "position", meaning: "職", day: 2 },
  // Day 3
  { word: "produce", meaning: "農産物", day: 3 },
  { word: "range", meaning: "範囲", day: 3 },
  { word: "regulation", meaning: "規則", day: 3 },
  { word: "author", meaning: "著者", day: 3 },
  { word: "railing", meaning: "手すり", day: 3 },
  { word: "fund", meaning: "資金", day: 3 },
  { word: "quality", meaning: "品質", day: 3 },
  { word: "agency", meaning: "代理店", day: 3 },
  { word: "committee", meaning: "委員会", day: 3 },
  { word: "function", meaning: "機能", day: 3 },
  { word: "authority", meaning: "権威", day: 3 },
  { word: "passenger", meaning: "乗客", day: 3 },
  { word: "proposal", meaning: "提案", day: 3 },
  { word: "drawer", meaning: "引き出し", day: 3 },

  // Day 4
  { word: "customer", meaning: "顧客", day: 4 },

  { word: "fuel", meaning: "燃料", day: 4 },
  { word: "quarter", meaning: "四半期", day: 4 },
  { word: "clerk", meaning: "事務員", day: 4 },
  { word: "policy", meaning: "保険契約", day: 4 },
  { word: "rent", meaning: "賃貸料", day: 4 },
  { word: "tour", meaning: "視察", day: 4 },
  { word: "analysis", meaning: "分析", day: 4 },
  { word: "crop", meaning: "農作物", day: 4 },
  { word: "description", meaning: "描写", day: 4 },
  { word: "fine", meaning: "罰金", day: 4 },
  { word: "attitude", meaning: "態度", day: 4 },
  { word: "audience", meaning: "聴衆", day: 4 },
  { word: "option", meaning: "選択", day: 4 },
  { word: "raise", meaning: "賃上げ", day: 4 },
  // Day 5
  { word: "amount", meaning: "量", day: 5 },
  { word: "article", meaning: "品物", day: 5 },
  { word: "fee", meaning: "料金", day: 5 },
  { word: "attention", meaning: "注意", day: 5 },

  // Day 6
  { word: "cafeteria", meaning: "食堂", day: 6 },

  { word: "suggestion", meaning: "提案", day: 6 },
  { word: "method", meaning: "方法", day: 6 },
  { word: "opening", meaning: "欠員", day: 6 },

  { word: "concern", meaning: "懸念", day: 6 },
  { word: "performance", meaning: "実績", day: 6 },
  { word: "agreement", meaning: "契約", day: 6 },
  { word: "employee", meaning: "従業員", day: 6 },
  { word: "measure", meaning: "対策", day: 6 },
  { word: "discount", meaning: "割引", day: 6 },
  { word: "institution", meaning: "機関", day: 6 },
  { word: "material", meaning: "材料", day: 6 },
  { word: "product", meaning: "製品", day: 6 },
  { word: "stock", meaning: "株", day: 6 },
  // Day 7
  { word: "content", meaning: "内容", day: 7 },
  { word: "interest", meaning: "利息", day: 7 },
  { word: "broadcast", meaning: "放送", day: 7 },
  { word: "fountain", meaning: "噴水", day: 7 },
  { word: "impact", meaning: "影響", day: 7 },

  { word: "means", meaning: "手段", day: 7 },
  { word: "research", meaning: "研究", day: 7 },
  { word: "box office", meaning: "切符売り場", day: 7 },
  { word: "career", meaning: "職業", day: 7 },
  { word: "dentist", meaning: "歯医者", day: 7 },
  // Day 8
  { word: "security", meaning: "警備、防護", day: 8 },
  { word: "duty", meaning: "職務", day: 8 },
  { word: "influence", meaning: "影響", day: 8 },
  { word: "chemical", meaning: "化学物質", day: 8 },
  { word: "government", meaning: "政府", day: 8 },
  { word: "industry", meaning: "産業", day: 8 },
  { word: "organization", meaning: "組織(体)、団体", day: 8 },
  { word: "reward", meaning: "報酬、ほうび", day: 8 },
  { word: "arrival", meaning: "到着", day: 8 },
  { word: "baggage", meaning: "手荷物", day: 8 },
  { word: "condition", meaning: "条件", day: 8 },
  { word: "management", meaning: "経営陣", day: 8 },
  { word: "production", meaning: "生産", day: 8 },
  { word: "deal", meaning: "商取引", day: 8 },
  { word: "saving", meaning: "貯金", day: 8 },
  { word: "announcement", meaning: "発表", day: 8 }
];

let quizQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let totalQuestionsCount = 10;

// テスト開始（モード選択）
function startQuiz(mode) {
    score = 0;
    currentQuestionIndex = 0;
    
    if (mode === 'all') {
        // 総合テスト：全単語からランダムに10問選出
        totalQuestionsCount = 10;
        const shuffled = [...wordMaster].sort(() => Math.random() - 0.5);
        quizQuestions = shuffled.slice(0, totalQuestionsCount);
    } else {
        // 各ユニットテスト：選ばれたDayの16単語すべてを出題
        totalQuestionsCount = 16;
        const filtered = wordMaster.filter(item => item.day === mode);
        quizQuestions = filtered.sort(() => Math.random() - 0.5); // 出題順もランダムシャッフル
    }
    
    document.getElementById("menu-screen").style.display = "none";
    document.getElementById("quiz-screen").style.display = "block";
    document.getElementById("result-screen").style.display = "none";
    
    showQuestion();
}

// 問題の表示
function showQuestion() {
    const currentQuestion = quizQuestions[currentQuestionIndex];
    
    document.getElementById("progress").textContent = `問題 ${currentQuestionIndex + 1} / ${totalQuestionsCount} (Day ${currentQuestion.day})`;
    document.getElementById("question-word").textContent = currentQuestion.word;
    document.getElementById("feedback").textContent = "";
    document.getElementById("next-button").style.display = "none";
    
    // 他のDayも含めた全単語からダミー（誤解答）を3つ選出
    const dummys = wordMaster
        .filter(item => item.meaning !== currentQuestion.meaning)
        .sort(() => Math.random() - 0.5)
        .slice(0, 3)
        .map(item => item.meaning);
        
    // 正解とダミーを混ぜてシャッフル
    const options = [currentQuestion.meaning, ...dummys].sort(() => Math.random() - 0.5);
    
    const optionsContainer = document.getElementById("options-container");
    optionsContainer.innerHTML = "";
    
    options.forEach((option, index) => {
        const button = document.createElement("button");
        button.className = "btn";
        button.textContent = `${index + 1}. ${option}`;
        button.onclick = () => checkAnswer(button, option, currentQuestion.meaning);
        optionsContainer.appendChild(button);
    });
}

// 解答判定
function checkAnswer(selectedButton, selectedValue, correctValue) {
    const buttons = document.querySelectorAll(".options-grid .btn");
    buttons.forEach(btn => btn.disabled = true);
    
    if (selectedValue === correctValue) {
        selectedButton.classList.add("correct");
        document.getElementById("feedback").textContent = "⭕ 正解！";
        document.getElementById("feedback").style.color = "#48bb78";
        score++;
    } else {
        selectedButton.classList.add("wrong");
        document.getElementById("feedback").textContent = `❌ 正解は: ${correctValue}`;
        document.getElementById("feedback").style.color = "#f56565";
        
        buttons.forEach(btn => {
            if (btn.textContent.includes(correctValue)) {
                btn.classList.add("correct");
            }
        });
    }
    
    document.getElementById("next-button").style.display = "block";
}

// 次の問題、またはリザルト
function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < totalQuestionsCount) {
        showQuestion();
    } else {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("score").textContent = `${score} / ${totalQuestionsCount} 問正解`;
    }
}

// メニューに戻る
function backToMenu() {
    document.getElementById("menu-screen").style.display = "block";
    document.getElementById("quiz-screen").style.display = "none";
    document.getElementById("result-screen").style.display = "none";
}
</script>

</body>
</html>
